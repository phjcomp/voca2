<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#111111">
    
    <!-- Disable Cache -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>SAT Vocab</title>
    <link rel="stylesheet" href="styles.css?v=45">
    
    <!-- Fonts: Playfair Display for Serifs, Inter for Sans-Serif -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <!-- Ionicons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>
<body>
    <div id="app" class="state-loading">
        <!-- Loading State -->
        <div id="loading-view" class="view">
            <h1 class="logo-font">Loading...</h1>
        </div>

        <!-- Auth View -->
        <div id="auth-view" class="view hidden">
            <h1 class="logo-font">SAT Vocab</h1>
            <p class="subtitle">Super Minimalist Spaced Repetition</p>
            <button id="btn-login" class="pill-btn primary">
                <ion-icon name="logo-google"></ion-icon>
                Sign in with Google
            </button>
        </div>

        <!-- Deck Selection View -->
        <div id="deck-view" class="view hidden">
            <nav class="top-bar" style="margin-bottom: 0px;">
                <div style="font-weight: bold; font-size: 1.2rem; display: flex; align-items: center; gap: 8px;">
                    <ion-icon name="library"></ion-icon> Select Deck
                </div>
                <button class="icon-btn" id="btn-close-library" style="font-size: 28px; padding:0; margin:0;"><ion-icon name="close-outline"></ion-icon></button>
            </nav>
            <div id="deck-list" style="flex: 1; overflow-y: auto; padding: 20px 0; margin-top: 20px;">
                <!-- Render decks here -->
            </div>
        </div>

        <!-- Main Card View -->
        <div id="card-view" class="view hidden">
            <div id="combo-display" style="position: absolute; top: max(env(safe-area-inset-top, 20px), 25px); left: 50%; transform: translateX(-50%); font-weight: 800; color: #ff9800; font-size: 1.1rem; z-index: 1000; opacity: 0; transition: opacity 0.3s; pointer-events: none; letter-spacing: 1px;">🔥 10 COMBO!</div>
            <!-- App Bar -->
            <div class="top-bar" style="justify-content: flex-end;">
                
                <div class="top-actions">
                    <div class="mode-toggle" id="mode-toggle">
                        <div class="toggle-option active" id="mode-quiz">Quiz</div>
                        <div class="toggle-option" id="mode-study">Study</div>
                    </div>
                    <button class="icon-btn" id="btn-library" style="display: none;"><ion-icon name="library-outline"></ion-icon></button>
                    <button class="icon-btn" id="btn-theme"><ion-icon name="moon-outline"></ion-icon></button>
                    <button class="icon-btn" id="btn-logout"><ion-icon name="log-out-outline"></ion-icon></button>
                </div>
            </div>

            <div class="card-content-wrapper" id="card-trigger">
                <div id="progress-text" class="progress-text" style="text-align: center; margin-bottom: 16px; font-weight: 600; color: var(--text-main); font-size: 0.95rem;">Loading...</div>
                <!-- Word Section -->
                <div class="word-section">
                    <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                        <span class="part-of-speech" id="val-pos">VERB</span>
                        <span id="val-combo" style="font-weight: 800; color: #ff9800; font-size: 0.95rem; letter-spacing: 0.5px;">0 Combo!</span>
                    </div>
                    <h1 class="target-word" id="val-word">contemplate</h1>
                    
                    <div class="pronunciation-row">
                        <button class="icon-btn audio-btn" id="btn-audio">
                            <ion-icon name="volume-high-outline"></ion-icon>
                        </button>
                        <span class="pronunciation" id="val-pronunciation">/pronunciation/</span>
                    </div>
                </div>

                <!-- Quiz Options (Hidden initially) -->
                <div class="quiz-options hidden" id="quiz-options">
                </div>

                <!-- Back Details (Hidden on Front) -->
                <div class="back-details" id="back-details">
                    <div id="content-definition" style="margin-bottom: 2rem;">
                        <h2 class="section-title">Definition</h2>
                        <p class="main-definition" id="val-definition">look thoughtfully for a long time at.</p>
                    </div>
                    
                    <div id="content-examples" style="padding-bottom: 2rem;">
                        <h2 class="section-title">Examples</h2>
                        <ul class="bullet-list" id="val-examples">
                        </ul>
                    </div>
                </div>
            </div>

            <!-- Controls -->
            <div class="bottom-controls">
                <!-- Front Controls -->
                <div id="controls-front" class="control-group">
                    <p class="hint-text">Tap anywhere to reveal</p>
                </div>
                
                <!-- Back Controls -->
                <div id="controls-back" class="control-group hidden">
                    <button class="circle-btn btn-left" id="btn-known">
                        <ion-icon name="thumbs-up-outline"></ion-icon>
                    </button>
                    <button class="circle-btn btn-up" id="btn-unsure">
                        <ion-icon name="alert-outline"></ion-icon>
                    </button>
                    <button class="circle-btn btn-right" id="btn-unknown">
                        <ion-icon name="thumbs-down-outline"></ion-icon>
                    </button>
                </div>
                
                <!-- Quiz Controls -->
                <div id="controls-quiz" class="control-group hidden">
                    <button class="pill-btn primary" id="btn-next-quiz" style="padding: 12px 48px; font-size: 1.1rem;">Next ➔</button>
                </div>
            </div>
            
        </div>
    </div>
    
    <script type="module" src="app.js?v=45"></script>
</body>
</html>
